name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node (ډېر مهم ✅)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      # 3️⃣ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 4️⃣ Install libvips (for sharp)
      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      # 5️⃣ Install Dependencies (CI mode ✅)
      - name: Install dependencies
        run: npm ci

      # 6️⃣ Build Web App
      - name: Build Web App
        run: npm run build

      # 7️⃣ Init & Sync Capacitor
      - name: Sync with Capacitor
        run: |
          npx cap init "د عمرې لارښود" "com.amanmedia.umrah" --web-dir dist
          npx cap add android
          npx cap sync android

      # 8️⃣ Generate Android Icons
      - name: Generate Icon
        run: |
          if [ -f "logo.png" ]; then
            mkdir -p assets
            cp logo.png assets/icon.png
            npx capacitor-assets generate --android
          else
            echo "logo.png not found, skipping icon generation."
          fi

      # 9️⃣ Inject Permissions
      - name: Inject Permissions
        run: |
          cd android/app/src/main
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>\n    <application/g' AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:requestLegacyExternalStorage="true"/g' AndroidManifest.xml

      # 🔟 Fix Kotlin Conflict
      - name: Fix Kotlin Dependency Conflict
        run: |
          cd android
          cat >> build.gradle <<EOF
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      # 1️⃣1️⃣ Build APK
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 1️⃣2️⃣ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Umrah-Guide-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
